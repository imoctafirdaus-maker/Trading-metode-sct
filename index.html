<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC PRO TERMINAL - Real-Time Analysis</title>
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #080a0c;
            --bg-card: #111418;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --text-dim: #848e9c;
            --border-color: #2a2e39;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        header {
            grid-column: 1 / 3;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }
        .logo span { color: var(--neon-green); }
        .controls { display: flex; gap: 10px; align-items: center; }
        
        select, .tf-btn {
            background: #1e222d; border: 1px solid var(--border-color);
            color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }

        .panel-card {
            background: #1e222d; border-radius: 8px; padding: 12px;
            border-left: 4px solid var(--text-dim);
        }

        .panel-card.active-buy { border-left-color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .panel-card.active-sell { border-left-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 62, 62, 0.1); }

        .label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        .value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; display: block; margin-top: 5px; }

        #chart-container { position: relative; width: 100%; height: 100%; background: var(--bg-dark); }
        #tv-chart { width: 100%; height: 100%; }

        .status-dot {
            width: 8px; height: 8px; background: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 5px;
            box-shadow: 0 0 8px var(--neon-green);
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; grid-template-rows: 60px 180px 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid var(--border-color); flex-direction: row; overflow-x: auto; padding: 10px; }
            .panel-card { min-width: 150px; padding: 8px; }
            .logo { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo">SMC<span>PRO</span></div>
        <div class="controls">
            <select id="pairSelect">
                <option value="BTCUSDT">BTC/USDT</option>
                <option value="ETHUSDT">ETH/USDT</option>
                <option value="SOLUSDT">SOL/USDT</option>
            </select>
            <div id="live-indicator"><span class="status-dot"></span> <small>LIVE</small></div>
        </div>
    </header>

    <aside class="sidebar">
        <div id="signalCard" class="panel-card">
            <span class="label">SMC Bias</span>
            <span id="signalText" class="value" style="font-weight: bold; color: var(--neon-green);">SCANNING...</span>
        </div>
        <div class="panel-card">
            <span class="label">Entry Zone</span>
            <span id="entryVal" class="value">0.00</span>
        </div>
        <div class="panel-card">
            <span class="label">Target TP</span>
            <span id="tpVal" class="value" style="color: var(--neon-green);">0.00</span>
        </div>
    </aside>

    <main id="chart-container">
        <div id="tv-chart"></div>
    </main>
</div>

<script>
    let chart, candleSeries, socket;
    let candleData = [];

    function initChart() {
        const container = document.getElementById('tv-chart');
        chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#080a0c' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#161a1e' }, horzLines: { color: '#161a1e' } },
            timeScale: { borderColor: '#2a2e39', timeVisible: true },
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3e3e',
            borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff3e3e',
        });

        window.addEventListener('resize', () => {
            chart.resize(container.offsetWidth, container.offsetHeight);
        });
    }

    async function fetchHistory(pair) {
        // Ambil data history agar chart tidak kosong saat pertama buka
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=5m&limit=100`);
        const data = await res.json();
        const history = data.map(d => ({
            time: d[0] / 1000,
            open: parseFloat(d[1]),
            high: parseFloat(d[2]),
            low: parseFloat(d[3]),
            close: parseFloat(d[4])
        }));
        candleSeries.setData(history);
        candleData = history;
    }

    function connectStream(pair) {
        if (socket) socket.close();
        
        // Gunakan port 443 agar tidak diblokir provider internet
        socket = new WebSocket(`wss://stream.binance.com:443/ws/${pair.toLowerCase()}@kline_5m`);

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            const candle = {
                time: k.t / 1000,
                open: parseFloat(k.o),
                high: parseFloat(k.h),
                low: parseFloat(k.l),
                close: parseFloat(k.c)
            };
            candleSeries.update(candle);
            detectBOS(candle);
        };
    }

    function detectBOS(candle) {
        if (candleData.length < 20) return;
        const recent = candleData.slice(-10);
        const high = Math.max(...recent.map(c => c.high));
        const low = Math.min(...recent.map(c => c.low));

        if (candle.close > high) {
            updateUI(candle.close, "🔥 BULLISH BOS", "active-buy");
        } else if (candle.close < low) {
            updateUI(candle.close, "🔻 BEARISH BOS", "active-sell");
        }
    }

    function updateUI(price, text, css) {
        document.getElementById('signalCard').className = 'panel-card ' + css;
        document.getElementById('signalText').innerText = text;
        document.getElementById('entryVal').innerText = price.toFixed(2);
        document.getElementById('tpVal').innerText = (css === 'active-buy' ? price * 1.01 : price * 0.99).toFixed(2);
    }

    // Start App
    initChart();
    const pair = document.getElementById('pairSelect');
    
    async function start(p) {
        await fetchHistory(p);
        connectStream(p);
    }

    pair.addEventListener('change', (e) => start(e.target.value));
    start('BTCUSDT');
</script>

</body>
</html>
