<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT RADAR OCTA</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { background: #1e2329; padding: 10px; border-radius: 8px; border-left: 5px solid #f0b90b; margin-bottom: 10px; }
        #status-box { padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 10px; background: #2b3139; font-weight: bold; }
        #chart { width: 100%; height: 300px; background: #161a1e; border-radius: 8px; }
        .buy { background: #00c076 !important; color: white; }
        .danger { background: #cf304a !important; color: white; }
        .stats { display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin:0;">SCT RADAR OCTA</h3>
        <small>Target SIREN | Leverage 16x</small>
    </div>

    <div id="status-box">MENGHUBUNGKAN...</div>
    <div id="chart"></div>
    
    <div class="stats">
        <span>Entry: $1.45</span>
        <span id="live-price">Wait...</span>
        <span>SL: $1.385</span>
    </div>

    <script>
        // Inisialisasi Chart
        const chartElement = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartElement, {
            layout: { backgroundColor: '#161a1e', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2b2f3a' }, horzLines: { color: '#2b2f3a' } },
            timeScale: { borderColor: '#485c7b', timeVisible: true }
        });
        const candleSeries = chart.addCandlestickSeries();

        const statusBox = document.getElementById('status-box');
        const priceDisplay = document.getElementById('live-price');

        // Koneksi Binance WebSocket
        const connect = () => {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/sirenusdt@kline_1m');
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const k = data.k;
                const candle = {
                    time: k.t / 1000,
                    open: parseFloat(k.o),
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: parseFloat(k.c)
                };
                candleSeries.update(candle);
                priceDisplay.innerText = "$" + candle.close;

                // LOGIKA SCT (Smart Chart Trap)
                const body = Math.abs(candle.close - candle.open);
                const lowerWick = Math.min(candle.open, candle.close) - candle.low;
                const upperWick = candle.high - Math.max(candle.open, candle.close);

                if (candle.close <= 1.50 && lowerWick > body * 1.3) {
                    statusBox.innerHTML = "🚀 WAKTUNYA MASUK! (SCT BUY)";
                    statusBox.className = "buy";
                } else if (upperWick > body * 1.8) {
                    statusBox.innerHTML = "⚠️ JANGAN LONG! (REJECTION)";
                    statusBox.className = "danger";
                } else {
                    statusBox.innerHTML = "MONITORING MARKET...";
                    statusBox.className = "";
                }
            };

            socket.onclose = () => {
                statusBox.innerHTML = "RECONNECTING...";
                setTimeout(connect, 3000);
            };
        };

        connect();
    </script>
</body>
</html>
