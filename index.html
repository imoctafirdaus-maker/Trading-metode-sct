<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT RADAR</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        #status-box { padding: 20px; text-align: center; border-radius: 10px; background: #2b3139; font-weight: bold; margin-bottom: 10px; font-size: 18px; }
        #chart { width: 100%; height: 350px; background: #161a1e; border-radius: 10px; }
        .buy { background: #00c076 !important; }
        .danger { background: #cf304a !important; }
        .info { display: flex; justify-content: space-between; margin-top: 10px; color: #848e9c; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status-box">MENGHUBUNGKAN KE BINANCE...</div>
    <div id="chart"></div>
    <div class="info">
        <span>Target: SIREN ($1.45)</span>
        <span id="price">Loading...</span>
        <span>SL: $1.385</span>
    </div>

    <script>
        const statusBox = document.getElementById('status-box');
        const priceText = document.getElementById('price');
        
        // 1. Setup Chart
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#161a1e', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2b2f3a' }, horzLines: { color: '#2b2f3a' } },
        });
        const candleSeries = chart.addCandlestickSeries();

        // 2. Ambil Data Awal (Biar tidak putih kosong)
        fetch('https://api.binance.com/api/v3/klines?symbol=SIRENUSDT&interval=1m&limit=50')
            .then(res => res.json())
            .then(data => {
                const formattedData = data.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
                }));
                candleSeries.setData(formattedData);
                startLive();
            });

        // 3. Data Live & Logika SCT
        function startLive() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/sirenusdt@kline_1m');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                const k = msg.k;
                const candle = { time: k.t / 1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) };
                
                candleSeries.update(candle);
                priceText.innerText = "$" + candle.close;
                statusBox.innerText = "MONITORING SCT...";

                // LOGIKA SCT (Smart Chart Trap)
                const body = Math.abs(candle.close - candle.open);
                const lowerWick = Math.min(candle.open, candle.close) - candle.low;
                
                if (candle.close <= 1.50 && lowerWick > body) {
                    statusBox.innerText = "🚀 WAKTUNYA MASUK! (SCT BUY)";
                    statusBox.className = "buy";
                } else if (candle.close > candle.open * 1.05) {
                    statusBox.innerText = "⚠️ JANGAN KEJAR! (OVERBOUGHT)";
                    statusBox.className = "danger";
                } else {
                    statusBox.className = "";
                }
            };
        }
    </script>
</body>
</html>
