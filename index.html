<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC PRO TERMINAL</title>
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #080a0c;
            --bg-card: #111418;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --text-dim: #848e9c;
            --border-color: #2a2e39;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        header {
            grid-column: 1 / 3;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }
        .logo span { color: var(--neon-green); }

        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .panel-card {
            background: #1e222d; border-radius: 8px; padding: 12px;
            border-left: 4px solid var(--text-dim);
        }

        /* AREA CHART HARUS PUNYA DIMENSI JELAS */
        #chart-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: var(--bg-dark);
        }

        #tv-chart { 
            width: 100% !important; 
            height: 100% !important; 
        }

        .status-dot {
            width: 8px; height: 8px; background: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 5px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; grid-template-rows: 60px 140px 1fr; }
            .sidebar { border-right: none; flex-direction: row; overflow-x: auto; }
            .panel-card { min-width: 120px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo">SMC<span>PRO</span></div>
        <div style="display: flex; gap: 10px;">
            <select id="pairSelect" style="background:#1e222d; color:white; border:1px solid var(--border-color); border-radius:4px;">
                <option value="BTCUSDT">BTC/USDT</option>
                <option value="ETHUSDT">ETH/USDT</option>
                <option value="SOLUSDT">SOL/USDT</option>
            </select>
            <div id="live-indicator"><span class="status-dot"></span> <small>LIVE</small></div>
        </div>
    </header>

    <aside class="sidebar">
        <div class="panel-card">
            <span style="color:var(--text-dim); font-size:10px;">ENTRY</span>
            <div id="entryVal" style="font-family:'JetBrains Mono';">0.00</div>
        </div>
        <div class="panel-card">
            <span style="color:var(--text-dim); font-size:10px;">TARGET</span>
            <div id="tpVal" style="font-family:'JetBrains Mono'; color:var(--neon-green);">0.00</div>
        </div>
    </aside>

    <main id="chart-container">
        <div id="tv-chart"></div>
    </main>
</div>

<script>
    // 1. Inisialisasi Firebase (Ganti dengan config kamu)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://your-db.firebaseio.com",
        projectId: "your-project-id",
    };
    firebase.initializeApp(firebaseConfig);

    let chart, candleSeries, socket;

    // 2. Fungsi Utama Inisialisasi Chart
    function createTradingChart() {
        const chartElement = document.getElementById('tv-chart');
        
        chart = LightweightCharts.createChart(chartElement, {
            layout: { 
                background: { color: '#080a0c' }, 
                textColor: '#d1d4dc' 
            },
            grid: {
                vertLines: { color: '#161a1e' },
                horzLines: { color: '#161a1e' },
            },
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
            timeScale: { timeVisible: true, secondsVisible: false }
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3e3e',
            borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff3e3e',
        });

        // Resize otomatis
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartElement.clientWidth, 
                height: chartElement.clientHeight 
            });
        });
    }

    // 3. Ambil Data History & Connect Stream
    async function startEngine(pair) {
        if (socket) socket.close();

        // Ambil data awal agar tidak kosong
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=5m&limit=100`);
        const data = await response.json();
        const formattedData = data.map(d => ({
            time: d[0] / 1000,
            open: parseFloat(d[1]),
            high: parseFloat(d[2]),
            low: parseFloat(d[3]),
            close: parseFloat(d[4])
        }));
        candleSeries.setData(formattedData);

        // Live update via WebSocket port 443
        socket = new WebSocket(`wss://stream.binance.com:443/ws/${pair.toLowerCase()}@kline_5m`);
        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            const liveCandle = {
                time: k.t / 1000,
                open: parseFloat(k.o),
                high: parseFloat(k.h),
                low: parseFloat(k.l),
                close: parseFloat(k.c)
            };
            candleSeries.update(liveCandle);
            document.getElementById('entryVal').innerText = liveCandle.close;
        };
    }

    // Eksekusi
    window.onload = () => {
        createTradingChart();
        startEngine('BTCUSDT');
        
        document.getElementById('pairSelect').onchange = (e) => {
            startEngine(e.target.value);
        };
    };
</script>
</body>
</html>
