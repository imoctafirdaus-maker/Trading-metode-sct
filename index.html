<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT SCANNER PRO - OCTA</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { background: #1e2329; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #f0b90b; }
        #status-box { padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 10px; background: #2b3139; }
        .buy-now { background: #00c076 !important; color: white; animation: blink 1s infinite; }
        .danger { background: #cf304a !important; color: white; }
        #chart { width: 100%; height: 300px; border-radius: 10px; overflow: hidden; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">SCT MULTI-SCANNER</h2>
        <p style="font-size: 12px; color: #848e9c;">Monitoring: SIREN, TAO, SOL (Leverage 16x Safety)</p>
    </div>

    <div id="status-box">MENCARI MOMENTUM...</div>
    <div id="chart"></div>

    <script>
        // --- KONFIGURASI CHART ---
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#0b0e11', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e2329' }, horzLines: { color: '#1e2329' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { borderColor: '#485c7b' }
        });
        const candleSeries = chart.addCandlestickSeries();

        // --- LOGIKA SCANNER & PERINGATAN ---
        const statusBox = document.getElementById('status-box');
        
        // Ganti koin di sini jika ingin pantau yang lain
        const symbol = 'sirenusdt'; 
        const socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol}@kline_1m`);

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const k = data.k;
            const candle = {
                time: k.t / 1000,
                open: parseFloat(k.o),
                high: parseFloat(k.h),
                low: parseFloat(k.l),
                close: parseFloat(k.c),
            };
            candleSeries.update(candle);

            // RUMUS SCT (Smart Chart Trap)
            const body = Math.abs(candle.close - candle.open);
            const lowerWick = Math.min(candle.open, candle.close) - candle.low;
            const upperWick = candle.high - Math.max(candle.open, candle.close);

            // 1. ATTENTION: WAKTU MASUK (Lampu Hijau)
            if (candle.close <= 1.46 && lowerWick > body * 1.5) {
                statusBox.innerHTML = "🚀 WAKTUNYA MASUK! (SCT BUY DETECTED)";
                statusBox.className = "buy-now";
            } 
            // 2. ATTENTION: BAHAYA/TURUN (Lampu Merah)
            else if (upperWick > body * 2 || (candle.close < candle.open && body > lowerWick)) {
                statusBox.innerHTML = "⚠️ JANGAN LONG! PASAR BERBAHAYA";
                statusBox.className = "danger";
            }
            else {
                statusBox.innerHTML = "HARGA SAAT INI: $" + candle.close;
                statusBox.className = "";
            }
        };
    </script>
</body>
</html>
