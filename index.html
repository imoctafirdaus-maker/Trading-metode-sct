<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC PRO TERMINAL - Fixed</title>
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg-dark: #080a0c; --bg-card: #111418; --neon-green: #00ff88; --border-color: #2a2e39; }
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .dashboard { display: grid; grid-template-rows: 60px 140px 1fr; height: 100vh; }
        header { background: var(--bg-card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); }
        .sidebar { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: var(--bg-card); }
        .panel-card { background: #1e222d; padding: 15px; border-radius: 8px; min-width: 140px; border-left: 4px solid #848e9c; }
        #chart-container { width: 100%; height: 100%; background: #000; position: relative; }
        #tv-chart { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div style="font-weight:900;">SMC<span style="color:var(--neon-green)">PRO</span></div>
        <div id="dbStatus" style="font-size: 10px; color: #ff3e3e;">DB ERROR</div>
    </header>

    <div class="sidebar">
        <div class="panel-card"><small>SMC SIGNAL</small><div id="sigText">SCANNING...</div></div>
        <div class="panel-card"><small>LIVE PRICE</small><div id="priceText">0.00</div></div>
    </div>

    <div id="chart-container"><div id="tv-chart"></div></div>
</div>

<script>
    // 1. CONFIG FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyDO8hsgUIrq7CN_96RdPSSFd1okLiTtw0I",
        authDomain: "sct-trading-octa.firebaseapp.com",
        databaseURL: "https://sct-trading-octa-default-rtdb.firebaseio.com", 
        projectId: "sct-trading-octa",
        storageBucket: "sct-trading-octa.firebasestorage.app",
        messagingSenderId: "753188973334",
        appId: "1:753188973334:web:aa4db9efd3ddd521cdbe37"
    };

    // Inisialisasi Chart DULU (Agar tidak hitam jika Firebase gagal)
    const container = document.getElementById('tv-chart');
    const chart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#080a0c' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#161a1e' }, horzLines: { color: '#161a1e' } },
        width: container.offsetWidth,
        height: container.offsetHeight,
    });
    const candleSeries = chart.addCandlestickSeries({ upColor: '#00ff88', downColor: '#ff3e3e' });

    // Fungsi Ambil Data
    async function loadData() {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=5m&limit=100`);
        const data = await res.json();
        candleSeries.setData(data.map(d => ({
            time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
        })));
        
        // WebSocket Live
        const ws = new WebSocket(`wss://stream.binance.com:443/ws/btcusdt@kline_5m`);
        ws.onmessage = (e) => {
            const k = JSON.parse(e.data).k;
            const candle = { time: k.t/1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) };
            candleSeries.update(candle);
            document.getElementById('priceText').innerText = candle.close;
        };
    }

    // Inisialisasi Firebase belakangan
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('.info/connected').on('value', snap => {
            document.getElementById('dbStatus').innerText = snap.val() ? "CONNECTED" : "DISCONNECTED";
            document.getElementById('dbStatus').style.color = snap.val() ? "#00ff88" : "#ff3e3e";
        });
    } catch(e) { console.log("Firebase Error"); }

    window.onload = loadData;
    window.onresize = () => chart.resize(container.offsetWidth, container.offsetHeight);
</script>
</body>
</html>
