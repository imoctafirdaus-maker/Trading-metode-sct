<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC PRO TERMINAL</title>
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #080a0c;
            --bg-card: #111418;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --text-dim: #848e9c;
            --border-color: #2a2e39;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        header {
            grid-column: 1 / 3;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .panel-card {
            background: #1e222d; border-radius: 8px; padding: 12px;
            border-left: 4px solid var(--text-dim);
        }

        /* Container Chart harus sangat dominan */
        #chart-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: #000;
            overflow: hidden;
        }

        #tv-chart { 
            width: 100%; 
            height: 100%; 
        }

        .status-dot {
            width: 8px; height: 8px; background: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 5px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; grid-template-rows: 60px 140px 1fr; }
            .sidebar { border-right: none; flex-direction: row; overflow-x: auto; padding: 10px; }
            .panel-card { min-width: 140px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo" style="font-weight:900;">SMC<span style="color:var(--neon-green)">PRO</span></div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="pairSelect" style="background:#1e222d; color:white; border:1px solid var(--border-color); padding:5px; border-radius:4px;">
                <option value="BTCUSDT">BTC/USDT</option>
                <option value="ETHUSDT">ETH/USDT</option>
                <option value="SOLUSDT">SOL/USDT</option>
            </select>
            <div id="live-indicator"><span class="status-dot"></span> <small>LIVE</small></div>
        </div>
    </header>

    <aside class="sidebar">
        <div class="panel-card" id="biasCard">
            <span style="color:var(--text-dim); font-size:10px;">BIAS</span>
            <div id="signalText" style="font-family:'JetBrains Mono'; font-weight: bold;">WAITING...</div>
        </div>
        <div class="panel-card">
            <span style="color:var(--text-dim); font-size:10px;">PRICE</span>
            <div id="entryVal" style="font-family:'JetBrains Mono';">0.00</div>
        </div>
    </aside>

    <main id="chart-container">
        <div id="tv-chart"></div>
    </main>
</div>

<script>
    // --- 1. CONFIG FIREBASE ---
    // Pastikan ini diisi dengan config dari project Firebase kamu sendiri
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://your-db.firebaseio.com",
        projectId: "your-project-id",
    };
    
    // Cegah inisialisasi ganda
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let chart, candleSeries, socket;
    let candleData = [];

    // --- 2. ENGINE CHART ---
    function initChart() {
        const chartElement = document.getElementById('tv-chart');
        
        chart = LightweightCharts.createChart(chartElement, {
            layout: { 
                background: { color: '#080a0c' }, 
                textColor: '#d1d4dc' 
            },
            grid: {
                vertLines: { color: '#161a1e' },
                horzLines: { color: '#161a1e' },
            },
            timeScale: { 
                timeVisible: true, 
                borderColor: '#2a2e39'
            },
            rightPriceScale: {
                borderColor: '#2a2e39'
            }
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3e3e',
            borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff3e3e',
        });

        // OBSERVER: Memaksa chart mengikuti ukuran layar sekecil apapun (PENTING UNTUK HP)
        const resizeObserver = new ResizeObserver(entries => {
            if (entries.length === 0 || !entries[0].contentRect) return;
            const { width, height } = entries[0].contentRect;
            chart.applyOptions({ width, height });
        });
        resizeObserver.observe(chartElement);
    }

    // --- 3. LOGIKA DATA ---
    async function startStream(pair) {
        if (socket) socket.close();

        // Ambil data history dari Binance
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=5m&limit=100`);
            const data = await res.json();
            const history = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4])
            }));
            candleSeries.setData(history);
            candleData = history;
        } catch (e) {
            console.error("Gagal ambil history", e);
        }

        // Live WebSocket Port 443
        socket = new WebSocket(`wss://stream.binance.com:443/ws/${pair.toLowerCase()}@kline_5m`);
        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            const liveCandle = {
                time: k.t / 1000,
                open: parseFloat(k.o),
                high: parseFloat(k.h),
                low: parseFloat(k.l),
                close: parseFloat(k.c)
            };
            candleSeries.update(liveCandle);
            document.getElementById('entryVal').innerText = liveCandle.close;
            
            // Simpan ke array untuk deteksi signal
            if (candleData.length > 0 && candleData[candleData.length-1].time === liveCandle.time) {
                candleData[candleData.length-1] = liveCandle;
            } else {
                candleData.push(liveCandle);
                if (candleData.length > 150) candleData.shift();
            }
            
            checkSMC(liveCandle, pair);
        };
    }

    // --- 4. DETEKSI SMC & FIREBASE ---
    function checkSMC(candle, pair) {
        if (candleData.length < 20) return;
        const lookback = candleData.slice(-15, -1);
        const high = Math.max(...lookback.map(c => c.high));
        const low = Math.min(...lookback.map(c => c.low));

        let signal = "";
        if (candle.close > high) signal = "BULLISH BOS";
        if (candle.close < low) signal = "BEARISH BOS";

        if (signal !== "") {
            document.getElementById('signalText').innerText = signal;
            document.getElementById('signalText').style.color = signal.includes("BULLISH") ? "#00ff88" : "#ff3e3e";
            
            // Simpan ke Firebase (Hanya log sederhana)
            db.ref('smc_logs').push({
                pair: pair,
                signal: signal,
                price: candle.close,
                time: new Date().toISOString()
            });
        }
    }

    // Eksekusi Startup
    window.onload = () => {
        initChart();
        startStream('BTCUSDT');
        
        document.getElementById('pairSelect').onchange = (e) => {
            startStream(e.target.value);
        };
    };
</script>
</body>
</html>
